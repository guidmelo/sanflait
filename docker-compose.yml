version: '3.9'

services:
  postgres:
    image: postgres:15-alpine
    container_name: sanflait-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: sanflait
    ports:
      - '5432:5432'
    volumes:
      - sanflait-pg-data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres']
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: sanflait-redis
    ports:
      - '6379:6379'
    volumes:
      - sanflait-redis-data:/data

volumes:
  sanflait-pg-data:
  sanflait-redis-data:
